<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>KSP - Terminal Centralny</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0b0f19; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        .top-bar { background: #1e293b; padding: 15px; display: flex; justify-content: space-between; border-bottom: 2px solid #3b82f6; }
        .main-content { display: grid; grid-template-columns: 350px 1fr; gap: 20px; padding: 20px; flex-grow: 1; overflow: hidden; }
        .card { background: #111827; padding: 20px; border-radius: 8px; border: 1px solid #374151; overflow-y: auto; }
        input, select, textarea { width: 100%; background: #1f2937; border: 1px solid #475569; color: white; padding: 10px; margin: 8px 0; border-radius: 4px; box-sizing: border-box; }
        button { background: #3b82f6; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; }
        .status-on { color: #10b981; }
        .status-off { color: #ef4444; }
    </style>
</head>
<body>

<div class="top-bar">
    <div><strong>KSP: SYSTEM OPERACYJNY</strong></div>
    <div id="userDisplay">Niezweryfikowany (Zaloguj przez Discord)</div>
</div>

<div class="main-content">
    <div class="card">
        <h3>Panel Służby</h3>
        <input type="text" id="officerName" placeholder="Imię i Nazwisko">
        <button onclick="toggleDuty()" id="dutyBtn">ROZPOCZNIJ SŁUŻBĘ</button>
        <hr>
        <h4>Funkcjonariusze on-line:</h4>
        <div id="dutyList"></div>
    </div>

    <div class="card">
        <h3>Generator Dokumentacji</h3>
        <select id="docType">
            <option value="Protokół Zatrzymania">Protokół Zatrzymania</option>
            <option value="Mandat Karny">Mandat Karny</option>
            <option value="Notatka Urzędowa">Notatka Urzędowa</option>
        </select>
        <input type="text" id="subject" placeholder="Dane sprawcy (PESEL/Nazwisko)">
        <textarea id="desc" rows="5" placeholder="Treść dokumentu..."></textarea>
        <button onclick="saveDoc()" style="background:#059669">WYSTAW DOKUMENT</button>
        
        <h3>Ostatnie Zdarzenia (Live)</h3>
        <div id="registry"></div>
    </div>
</div>

<script>
    // --- KONFIGURACJA (WKLEJ DANE Z FIREBASE) ---
    const firebaseConfig = {
        apiKey: "TWOJ_API_KEY",
        databaseURL: "https://TWOJ_PROJEKT.firebaseio.com",
        projectId: "TWOJ_PROJEKT"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // SŁUŻBA NA ŻYWO
    function toggleDuty() {
        const name = document.getElementById('officerName').value;
        if(!name) return alert("Podaj nazwisko!");
        
        const ref = db.ref('sluzba/' + name.replace(/\s+/g, '_'));
        ref.once('value', (snap) => {
            const status = snap.exists() && snap.val().active ? false : true;
            ref.set({ name, active: status, time: new Date().toLocaleTimeString() });
            document.getElementById('dutyBtn').innerText = status ? "ZAKOŃCZ SŁUŻBĘ" : "ROZPOCZNIJ SŁUŻBĘ";
        });
    }

    // ZAPIS DOKUMENTU
    function saveDoc() {
        const data = {
            officer: document.getElementById('officerName').value,
            type: document.getElementById('docType').value,
            subject: document.getElementById('subject').value,
            desc: document.getElementById('desc').value,
            time: new Date().toLocaleString()
        };
        db.ref('dokumentacja/').push(data);
        alert("Dokument wysłany do bazy!");
    }

    // NASŁUCHIWANIE NA ŻYWO (WIDOCZNE DLA WSZYSTKICH)
    db.ref('sluzba/').on('value', (snap) => {
        const list = document.getElementById('dutyList');
        list.innerHTML = '';
        snap.forEach(s => {
            const v = s.val();
            list.innerHTML += `<div>${v.name}: <span class="${v.active ? 'status-on' : 'status-off'}">${v.active ? 'NA SŁUŻBIE' : 'POZA'}</span></div>`;
        });
    });

    db.ref('dokumentacja/').on('value', (snap) => {
        const reg = document.getElementById('registry');
        reg.innerHTML = '';
        snap.forEach(s => {
            const v = s.val();
            reg.innerHTML = `<div style="border-bottom:1px solid #374151; padding:10px;">
                <b>${v.type}</b> | ${v.officer}<br>Sprawca: ${v.subject}<br><small>${v.desc}</small>
            </div>` + reg.innerHTML;
        });
    });
</script>
</body>
</html>
